exp_id: "math_posttrain_datatree"
base_model: "${BASE_MODEL_PATH}"
benchmark_suite:
  - "aime_2025"
  - "arena_hard_writing"
  - "bfcl"
  - "gpqa_main"
  - "gsm8k"
  - "healthbench_easy"
  - "human_eval"
evaluation:
  backend: "posttrainbench"
  benchmark_files:
    aime_2025: null
    arena_hard_writing: null
    bfcl: null
    gpqa_main: null
    gsm8k: null
    healthbench_easy: null
    human_eval: null
  prediction_files:
    aime_2025: null
    arena_hard_writing: null
    bfcl: null
    gpqa_main: null
    gsm8k: null
    healthbench_easy: null
    human_eval: null
  posttrainbench:
    repo_dir: "./playground/math_posttrain_datatree/external/PostTrainBench"
    python_bin: "./.venv_posttrainbench_eval/bin/python"
    templates_dir: "./playground/math_posttrain_datatree/external/PostTrainBench/src/eval/templates"
    limit: 100
    max_tokens: 2048
    max_connections: 16
    gpu_memory_utilization: null
    auto_select_device: false
    device: null
    max_num_seqs: null
    parallel_benchmarks: true
    max_parallel_benchmarks: 7
    env_overrides:
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_BASE_URL: "https://api.gpugeek.com/v1"
      OPENAI_JUDGE_MODEL: "Vendor2/GPT-5-mini"
    benchmark_devices:
      aime_2025: 0
      arena_hard_writing: 1
      healthbench_easy: 2
      bfcl: 3
      gpqa_main: 5
      human_eval: 6
      gsm8k: 7
training_mode: "lora_sft"
lf_dataset_format: "alpaca"
dry_run_training: false
data_access:
  hf_endpoint: "https://hf-mirror.com"
  datasets_server:
    enabled: false
    base_url: "https://datasets-server.huggingface.co"
llama_factory_env:
  env_dir: "./.venv_llamafactory"
  python_bin: null
  nproc_per_node: 1
  cuda_visible_devices: "0"
num_red: 1
num_black: 5
max_black_per_red: 5
max_rounds: 40

llm:
  openai:
    provider: "openai"
    model: "${GPT_CHAT_MODEL}"
    api_key: "${OPENAI_API_KEY}"
    base_url: "${GPT_BASE_URL}"
    temperature: 0.7
    max_tokens: 16384
    timeout: 60
    max_retries: 3
    retry_delay: 1.0

  anthropic:
    provider: "anthropic"
    model: "claude-haiku-4-5-20251001"
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "${ANTHROPIC_BASE_URL}"
    temperature: 0.7
    max_tokens: 16384
    timeout: 60
    max_retries: 3
    retry_delay: 1.0

  local_sglang:
    provider: "openai"
    model: "zhipu/GLM-4.6"
    api_key: "${IMAGE_MODEL_API_KEY}"
    base_url: "https://api.gpugeek.com/v1"
    temperature: 0.7
    max_tokens: 16384
    timeout: 300
    max_retries: 3
    retry_delay: 1.0

  default: "local_sglang"

agents:
  red:
    llm: "local_sglang"
    max_turns: 20
    tools:
      builtin: ["execute_bash", "finish", "think", "filesystem_read_file", "filesystem_write_file", "search_huggingface_search_datasets", "search_huggingface_get_dataset_readme", "search_web_google_search", "search_web_web_parse"]
      mcp: "mcp_config4data_isolated.json"
    context:
      max_tokens: 64000
      truncation_strategy: "latest_half"
      preserve_system_messages: true
      preserve_recent_turns: 4
    system_prompt_file: "prompts/red/system_prompt.md"
    user_prompt_file: "prompts/red/user_prompt.md"

  black:
    llm: "local_sglang"
    max_turns: 50
    tools:
      builtin: ["execute_bash", "str_replace_editor", "finish", "think"]
      mcp: "mcp_config_black.json"
    context:
      max_tokens: 32000
      truncation_strategy: "latest_half"
      preserve_system_messages: true
      preserve_recent_turns: 4
    system_prompt_file: "prompts/black/system_prompt.md"
    user_prompt_file: "prompts/black/user_prompt.md"

session:
  type: "local"
  local:
    working_dir: "./playground/math_posttrain_datatree/workspace"
    workspace_path: "./playground/math_posttrain_datatree/workspace"
    timeout: 600
    parallel:
      enabled: false

env:
  cluster:
    debug_pool:
      type: "cpu"
      max_concurrent: 1
    train_pool:
      type: "cpu"
      max_concurrent: 1
  docker:
    base_image: "python:3.11-slim"
    registry: "docker.io"
    pull_policy: "if_not_present"
  scheduler:
    type: "local"
    queue_timeout: 300
    retry_failed: false
    max_retries: 1

mcp:
  config_file: "mcp_config4data_isolated.json"
  enabled: true

system_prompt_file: "prompts/system_prompt.txt"

llm_output:
  show_in_console: true
  log_to_file: true
