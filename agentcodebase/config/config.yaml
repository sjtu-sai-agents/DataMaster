# Feishu Bot Configuration
feishu:
  keyword: AgentCodeBase 通知
  url: ${FEISHU_WEBHOOK}


# Logging Configuration
logging:
  level: INFO
  format: '[%(asctime)s] [%(levelname)s] [%(name)s:%(lineno)d] - %(message)s'
  file: ~/.codebase/logs.log

llm_pipeline:
  model:
    provider: openai
    api_key: ${IMAGE_MODEL_API_KEY}
    base_url: https://api.gpugeek.com/v1
    model: "Vendor2/GPT-5.4" 
    rate_limit: 20 
    max_tokens: 5012
    temperature: 0.7 

  prompts:
    system_prompt_path: "prompts/system/default.md"
    user_prompt_path: "prompts/user/default.md"

  output_data:
    output_dir: "output"
    experiment_name: "extract_code"
    need_time_stamp: false
