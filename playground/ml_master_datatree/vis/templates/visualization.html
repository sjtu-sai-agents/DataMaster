<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UCT Node + Trajectory Viewer (Enhanced)</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    :root { --bg:#0b1020; --panel:#131a2f; --text:#e7ebff; --muted:#95a0c7; --edge:#5f6b98; --accent:#4dabf7; }
    * { box-sizing:border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system; background:radial-gradient(1200px 600px at 10% 0%, #1f2d58 0%, var(--bg) 55%); color:var(--text); }
    .top { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; background:rgba(8,11,24,.75); backdrop-filter: blur(6px); position:sticky; top:0; z-index:5; border-bottom:1px solid #2a355f; }
    .title { font-weight:700; letter-spacing:.3px; }
    .meta { color:var(--muted); font-size:13px; }
    .layout { display:flex; height:calc(100vh - 56px); }
    .left { flex:1; position:relative; }
    .right { width:500px; border-left:1px solid #2a355f; background:rgba(12,18,37,.7); overflow:auto; }
    #svg { width:100%; height:100%; display:block; }
    .hint { position:absolute; left:12px; bottom:12px; color:var(--muted); font-size:12px; background:rgba(8,11,24,.7); padding:6px 8px; border-radius:8px; }
    .panel { padding:12px; }
    .card { background:var(--panel); border:1px solid #2c3760; border-radius:10px; padding:10px; margin-bottom:10px; }
    .k { color:#8ea3ff; font-size:12px; margin-bottom:4px; }
    .v { white-space:pre-wrap; word-break:break-word; font-size:13px; }
    .code { max-height:400px; overflow:auto; background:#0a1124; border:1px solid #33406f; border-radius:8px; padding:8px; font-size:11px; }

    .node text { fill:#fff; font-size:10px; pointer-events:none; }
    .node circle { stroke:#d9e0ff; stroke-width:1.1; transition: all 0.3s ease; }
    .node.has-traj circle { stroke-width:2.5; stroke:#4dabf7; }
    .node.no-traj circle { stroke-dasharray: 3,3; opacity: 0.7; }
    .node.sel circle { stroke:#ffd166; stroke-width:2.4; }

    /* Path highlighting */
    .link.path-highlight { stroke: #ffd166; stroke-width: 2.5; stroke-opacity: 0.9; }
    .node.on-path circle { stroke: #ffd166; stroke-width: 2.0; fill-opacity: 1.0; }

    .link { fill:none; stroke:var(--edge); stroke-opacity:.55; stroke-width:1.1; transition: all 0.3s ease; }

    /* Score card styling */
    .score-card {
      background: linear-gradient(135deg, rgba(77, 171, 247, 0.1) 0%, rgba(81, 207, 102, 0.1) 100%);
      border: 1px solid #4dabf7;
    }

    .score-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      align-items: center;
    }

    .score-label {
      font-size: 12px;
      color: #95a0c7;
      font-weight: 500;
    }

    .score-value {
      font-size: 14px;
      font-weight: 600;
    }

    .score-value.validation {
      color: #4dabf7;
    }

    .score-value.test {
      color: #51cf66;
    }

    .score-diff {
      font-size: 12px;
      margin-top: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      font-weight: 500;
    }

    .score-diff.positive {
      background: rgba(81, 207, 102, 0.1);
      color: #51cf66;
      border: 1px solid rgba(81, 207, 102, 0.3);
    }

    .score-diff.negative {
      background: rgba(255, 107, 107, 0.1);
      color: #ff6b6b;
      border: 1px solid rgba(255, 107, 107, 0.3);
    }

    /* Trajectory path indicator */
    .path-indicator {
      background: rgba(255, 209, 102, 0.1);
      border: 1px solid rgba(255, 209, 102, 0.3);
      border-radius: 6px;
      padding: 6px 8px;
      margin-bottom: 8px;
      font-size: 11px;
      color: #ffd166;
    }

    .message { background:rgba(10,17,36,.8); border:1px solid #2c3760; border-radius:8px; padding:10px; margin-bottom:8px; }
    .message-role { font-size:11px; font-weight:600; text-transform:uppercase; margin-bottom:4px; }
    .message-role.system { color:#ff6b6b; }
    .message-role.user { color:#4dabf7; }
    .message-role.assistant { color:#51cf66; }
    .message-role.tool { color:#ffd166; }
    .message-content { font-size:12px; white-space:pre-wrap; word-break:break-word; max-height:300px; overflow:auto; }
  </style>
</head>
<body>
  <div class="top">
    <div class="title">UCT Node + Trajectory (Enhanced)</div>
    <div>
      <div class="meta" id="meta"></div>
    </div>
  </div>
  <div class="layout">
    <div class="left">
      <svg id="svg"></svg>
      <div class="hint">Wheel: zoom · Drag: pan · Click node: trajectory | Solid circle: has data · Dashed circle: no data · Yellow path: trajectory path</div>
    </div>
    <div class="right"><div class="panel" id="panel"></div></div>
  </div>
  <script>
  const DATA = __DATA__;

  const panel = document.getElementById('panel');
  const metaEl = document.getElementById('meta');
  const svg = d3.select('#svg');
  const g = svg.append('g');
  const zoom = d3.zoom().scaleExtent([0.08, 4]).on('zoom', (e)=>g.attr('transform', e.transform));
  svg.call(zoom);

  let selectedNodeId = null;
  let currentPath = [];

  function updateMeta(){
    metaEl.textContent = `run=${DATA.run_dir} | nodes=${DATA.node_count} | with_traj=${DATA.matched_nodes}`;
  }

  // Enhanced node color with three-tier priority system
  function nodeColor(node, trajData) {
    // Tier 1: Special states
    if (node.is_buggy) return '#ff4d6d';           // Buggy - red
    if (node.is_terminal) return '#6c757d';        // Terminal - gray
    if (node.stage === 'root') return '#ffd166';   // Root - yellow

    // Tier 2: Performance-based gradient (if metric available)
    if (node.metric !== null && node.metric !== undefined) {
      // Color scale from blue (low) to green (high)
      const metric = Number(node.metric);
      if (Number.isFinite(metric)) {
        // Create a color scale based on metric performance
        // Adjust domain based on your typical metric range
        const minMetric = 0.7;  // Lower bound for good performance
        const maxMetric = 0.95; // Upper bound for excellent performance

        // Normalize metric to 0-1 range
        const normalized = Math.max(0, Math.min(1, (metric - minMetric) / (maxMetric - minMetric)));

        // Interpolate between blue (#4dabf7) and green (#51cf66)
        const blue = d3.rgb('#4dabf7');
        const green = d3.rgb('#51cf66');
        return d3.interpolate(blue, green)(normalized).toString();
      }
    }

    // Tier 3: Stage-based fallback
    if (!trajData[node.id]) return '#8893bd';  // No trajectory
    const stage = node.stage || '';
    if (stage === 'initial') return '#4dabf7';        // Initial - blue
    if (stage === 'draft') return '#4dabf7';         // Draft - blue
    if (stage === 'debug') return '#ff8787';         // Debug - light red
    if (stage === 'improve') return '#51cf66';       // Improve - green
    if (stage === 'data_search') return '#cc5de8';   // Data search - purple
    if (stage === 'black') return '#845ef7';         // Black - violet
    if (stage === 'red') return '#ff6b6b';           // Red - salmon
    return '#8893bd';  // Default
  }

  // Find parent node by ID
  function findParentNode(tree, parentId) {
    if (!parentId) return null;

    const findInTree = (node, targetId) => {
      if (node.id === targetId) return node;
      for (let child of node.children || []) {
        const found = findInTree(child, targetId);
        if (found) return found;
      }
      return null;
    };

    return findInTree(tree, parentId);
  }

  // Build path from node to root
  function buildPathToNode(nodeId) {
    const path = [];
    let current = findNode(DATA.tree, nodeId);

    while (current) {
      path.unshift(current.id);
      if (current.parent) {
        current = findParentNode(DATA.tree, current.parent);
      } else {
        break;
      }
    }

    return path;
  }

  // Highlight path from root to selected node
  function highlightPathToNode(nodeId) {
    currentPath = buildPathToNode(nodeId);

    // Apply highlighting to links
    g.selectAll('.link')
      .classed('path-highlight', d => currentPath.includes(d.target.data.id));

    // Apply highlighting to nodes
    g.selectAll('.node')
      .classed('on-path', d => currentPath.includes(d.data.id));
  }

  function renderNodeDetail(nodeId) {
    const trajData = DATA.node_trajectories || {};
    const traj = trajData[nodeId];

    panel.innerHTML = '';

    // Highlight path to this node
    highlightPathToNode(nodeId);

    // Path indicator
    if (currentPath.length > 1) {
      const pathIndicator = document.createElement('div');
      pathIndicator.className = 'path-indicator';
      pathIndicator.textContent = `📍 Trajectory Path: ${currentPath.length} nodes from root`;
      panel.appendChild(pathIndicator);
    }

    // 节点信息
    const nodeCard = document.createElement('div');
    nodeCard.className = 'card';
    nodeCard.innerHTML = '<div class="k">Node Info</div>';

    // 找到节点
    const findNode = (n, id) => {
      if (n.id === id) return n;
      for (let c of n.children || []) {
        const found = findNode(c, id);
        if (found) return found;
      }
      return null;
    };

    const node = findNode(DATA.tree, nodeId);
    if (node) {
      nodeCard.innerHTML += `<div class="v">ID: ${node.id.substring(0,16)}...</div>`;
      nodeCard.innerHTML += `<div class="v">Stage: ${node.stage || 'unknown'}</div>`;
      nodeCard.innerHTML += `<div class="v">Action: ${node.action_type || 'N/A'}</div>`;
      nodeCard.innerHTML += `<div class="v">Visits: ${node.visits || 0}</div>`;
      nodeCard.innerHTML += `<div class="v">Reward: ${node.reward !== null ? node.reward : 'N/A'}</div>`;
      nodeCard.innerHTML += `<div class="v">Total Reward: ${node.total_reward !== null ? node.total_reward : 'N/A'}</div>`;
      nodeCard.innerHTML += `<div class="v">UCT Value: ${node.uct_value !== null ? node.uct_value.toFixed(4) : 'N/A'}</div>`;

      // data_search 阶段不显示 metric，显示 data_ok 和 data_context
      if (node.stage === 'data_search') {
        nodeCard.innerHTML += `<div class="v">Data OK: ${node.data_ok !== null ? (node.data_ok ? 'Yes' : 'No') : 'N/A'}</div>`;
        if (node.data_context) {
          const contextPreview = node.data_context.substring(0, 100);
          nodeCard.innerHTML += `<div class="v">Data Context: ${contextPreview}${node.data_context.length > 100 ? '...' : ''}</div>`;
        }
      }

      nodeCard.innerHTML += `<div class="v">Buggy: ${node.is_buggy ? 'Yes' : 'No'}</div>`;
      nodeCard.innerHTML += `<div class="v">Valid: ${node.is_valid !== null ? (node.is_valid ? 'Yes' : 'No') : 'N/A'}</div>`;
    }
    panel.appendChild(nodeCard);

    // Enhanced Score Card
    const hasScores = (node.metric !== null && node.metric !== undefined) ||
                      (node.submission_score !== null && node.submission_score !== undefined);

    if (hasScores) {
      const scoreCard = document.createElement('div');
      scoreCard.className = 'card score-card';
      scoreCard.innerHTML = '<div class="k">Performance Scores</div>';

      // Validation Score
      if (node.metric !== null && node.metric !== undefined) {
        const metric = Number(node.metric);
        if (Number.isFinite(metric)) {
          scoreCard.innerHTML += `
            <div class="score-item">
              <span class="score-label">Validation Score:</span>
              <span class="score-value validation">${metric.toFixed(4)}</span>
            </div>
          `;
        }
      }

      // Test Score
      if (node.submission_score !== null && node.submission_score !== undefined) {
        const testScore = Number(node.submission_score);
        if (Number.isFinite(testScore)) {
          scoreCard.innerHTML += `
            <div class="score-item">
              <span class="score-label">Test Score:</span>
              <span class="score-value test">${testScore.toFixed(4)}</span>
            </div>
          `;
        }
      }

      // Score comparison
      if (node.metric !== null && node.submission_score !== null) {
        const metric = Number(node.metric);
        const testScore = Number(node.submission_score);
        if (Number.isFinite(metric) && Number.isFinite(testScore)) {
          const diff = testScore - metric;
          const indicator = diff >= 0 ? '↑' : '↓';
          const colorClass = diff >= 0 ? 'positive' : 'negative';
          const interpretation = diff >= 0 ? 'Better generalization' : 'Overfitting detected';

          scoreCard.innerHTML += `
            <div class="score-diff ${colorClass}">
              ${indicator} Test vs Validation: ${Math.abs(diff).toFixed(4)} (${interpretation})
            </div>
          `;
        }
      }

      panel.appendChild(scoreCard);
    }

    // Trajectory 信息
    if (traj) {
      const trajCard = document.createElement('div');
      trajCard.className = 'card';
      trajCard.innerHTML = '<div class="k">Trajectory</div>';
      trajCard.innerHTML += `<div class="v">Task: ${traj.task_id || 'N/A'}</div>`;
      trajCard.innerHTML += `<div class="v">Exp: ${traj.exp_name || 'N/A'}</div>`;
      trajCard.innerHTML += `<div class="v">Steps: ${traj.steps || 0}</div>`;
      trajCard.innerHTML += `<div class="v">Status: ${traj.status || 'Unknown'}</div>`;
      panel.appendChild(trajCard);

      // 显示对话历史
      if (traj.trajectory && traj.trajectory.messages && traj.trajectory.messages.length > 0) {
        const messages = traj.trajectory.messages;

        const messagesCard = document.createElement('div');
        messagesCard.className = 'card';
        messagesCard.innerHTML = '<div class="k">对话历史</div>';

        messages.forEach(msg => {
          messagesCard.appendChild(renderMessage(msg));
        });

        panel.appendChild(messagesCard);
      }
    } else {
      const noTraj = document.createElement('div');
      noTraj.className = 'card';
      noTraj.innerHTML = '<div class="v">No trajectory data for this node</div>';
      panel.appendChild(noTraj);
    }
  }

  function drawTree(){
    g.selectAll('*').remove();

    const root = d3.hierarchy(DATA.tree);
    d3.tree().nodeSize([100, 170])(root);

    g.selectAll('.link')
      .data(root.links())
      .enter()
      .append('path')
      .attr('class','link')
      .attr('d', d3.linkVertical().x(d=>d.x).y(d=>d.y));

    const nodes = g.selectAll('.node')
      .data(root.descendants())
      .enter()
      .append('g')
      .attr('class', d => {
        let classes = 'node';
        if (DATA.node_trajectories[d.data.id]) {
          classes += ' has-traj';
        } else {
          classes += ' no-traj';
        }
        if (d.data.id === selectedNodeId) classes += ' sel';
        return classes;
      })
      .attr('transform', d=>`translate(${d.x},${d.y})`)
      .on('click', function(_, d){
        selectedNodeId = d.data.id;
        g.selectAll('.node').classed('sel', n => n.data.id === selectedNodeId);
        renderNodeDetail(selectedNodeId);
      });

    nodes.append('circle')
      .attr('r', d=>{
        const v = Number(d.data.visits || 0);
        return Math.max(8, Math.min(22, 9 + Math.log10(v + 1) * 6));
      })
      .attr('fill', d=>nodeColor(d.data, DATA.node_trajectories));

    nodes.append('text')
      .attr('text-anchor','middle')
      .attr('dominant-baseline','middle')
      .text(d=>{
        // data_search 阶段不显示 metric，显示阶段标识
        if (d.data.stage === 'data_search') {
          return 'data';
        }
        const m = Number(d.data.metric);
        return Number.isFinite(m) ? m.toFixed(3) : '';
      });

    if (!selectedNodeId && DATA.tree && DATA.tree.id) {
      selectedNodeId = DATA.tree.id;
      renderNodeDetail(selectedNodeId);
    }
  }

  function init(){
    updateMeta();
    drawTree();

    // 默认选择第一个有 trajectory 的节点
    if (!selectedNodeId && DATA.tree && DATA.tree.id) {
      const firstWithTraj = findFirstNodeWithTraj(DATA.tree);
      if (firstWithTraj) {
        selectedNodeId = firstWithTraj.id;
        renderNodeDetail(selectedNodeId);
        g.selectAll('.node').classed('sel', n => n.data.id === selectedNodeId);
      }
    }

    svg.call(zoom.transform, d3.zoomIdentity.translate(70,40).scale(1));
  }

  function findFirstNodeWithTraj(node) {
    if (node.id && DATA.node_trajectories[node.id]) {
      return node;
    }
    for (let child of node.children || []) {
      const found = findFirstNodeWithTraj(child);
      if (found) return found;
    }
    return null;
  }

  function formatToolArgs(rawArgs) {
    if (rawArgs === null || rawArgs === undefined) return '';
    let text = rawArgs;
    if (typeof text !== 'string') {
      try {
        text = JSON.stringify(text, null, 2);
      } catch (_) {
        text = String(text);
      }
    }
    const trimmed = text.trim();
    if ((trimmed.startsWith('{') && trimmed.endsWith('}')) || (trimmed.startsWith('[') && trimmed.endsWith(']'))) {
      try {
        return JSON.stringify(JSON.parse(trimmed), null, 2);
      } catch (_) {
        return text;
      }
    }
    return text;
  }

  function parseToolCall(tc) {
    if (!tc) return { name: 'unknown', args: '' };

    // Structured format (OpenAI / internal object)
    if (typeof tc === 'object') {
      const fn = tc.function || {};
      const name = fn.name || tc.name || 'unknown';
      const args = fn.arguments !== undefined ? fn.arguments : (tc.arguments !== undefined ? tc.arguments : '');
      return { name, args };
    }

    // String format, e.g.
    // "id='...' type='function' function=FunctionCall(name='execute_bash', arguments='{\"command\":\"pwd\"}')"
    if (typeof tc === 'string') {
      let name = 'unknown';
      let args = '';

      const nameMatch = tc.match(/FunctionCall\\(name='([^']+)'/);
      if (nameMatch && nameMatch[1]) {
        name = nameMatch[1];
      } else {
        const fallbackName = tc.match(/name='([^']+)'/);
        if (fallbackName && fallbackName[1]) name = fallbackName[1];
      }

      const argsMatch = tc.match(/arguments='([\\s\\S]*?)'\\)/);
      if (argsMatch && argsMatch[1]) {
        args = argsMatch[1].replace(/\\\\'/g, "'");
      }

      return { name, args };
    }

    return { name: 'unknown', args: String(tc) };
  }

  function renderMessage(msg) {
    const msgDiv = document.createElement('div');
    msgDiv.className = 'message';

    const role = msg.role || 'unknown';
    msgDiv.innerHTML = `<div class="message-role ${role}">${role}</div>`;

    const contentDiv = document.createElement('div');
    contentDiv.className = 'message-content';

    // 处理 tool_calls
    const toolCalls = Array.isArray(msg.tool_calls) ? msg.tool_calls : [];
    if (toolCalls.length > 0) {
      toolCalls.forEach(tc => {
        const parsed = parseToolCall(tc);
        const funcName = parsed.name || 'unknown';
        const funcArgs = formatToolArgs(parsed.args);

        const toolDiv = document.createElement('div');
        toolDiv.style.background = 'rgba(255, 209, 102, 0.1)';
        toolDiv.style.border = '1px solid rgba(255, 209, 102, 0.3)';
        toolDiv.style.borderRadius = '6px';
        toolDiv.style.padding = '8px';
        toolDiv.style.marginBottom = '8px';

        toolDiv.innerHTML = `<strong>Tool: ${funcName}</strong>`;
        const argsDiv = document.createElement('div');
        argsDiv.style.fontSize = '11px';
        argsDiv.style.color = '#95a0c7';
        argsDiv.style.marginTop = '4px';
        argsDiv.style.whiteSpace = 'pre-wrap';
        argsDiv.style.wordBreak = 'break-word';
        argsDiv.textContent = funcArgs;
        toolDiv.appendChild(argsDiv);

        contentDiv.appendChild(toolDiv);
      });
    }

    // 处理普通 content
    if (msg.content) {
      if (typeof msg.content === 'string') {
        const textDiv = document.createElement('div');
        textDiv.textContent = msg.content || '(empty)';
        textDiv.style.marginTop = toolCalls.length > 0 ? '8px' : '0';
        contentDiv.appendChild(textDiv);
      } else if (Array.isArray(msg.content)) {
        // 多模态内容
        msg.content.forEach(item => {
          const itemDiv = document.createElement('div');
          itemDiv.style.marginTop = '4px';
          if (item.type === 'text') {
            itemDiv.textContent = item.text || '';
          } else if (item.type === 'image_url') {
            itemDiv.innerHTML = `<em>[Image: ${item.image_url?.url?.substring(0, 50)}...]</em>`;
          }
          contentDiv.appendChild(itemDiv);
        });
      }
    }

    // 对于 tool 角色，显示工具名称
    if (role === 'tool' && msg.name) {
      const nameDiv = document.createElement('div');
      nameDiv.style.fontSize = '11px';
      nameDiv.style.color = '#ffd166';
      nameDiv.style.marginBottom = '4px';
      nameDiv.textContent = `Tool: ${msg.name}`;
      contentDiv.insertBefore(nameDiv, contentDiv.firstChild);
    }

    msgDiv.appendChild(contentDiv);
    return msgDiv;
  }

  init();
  </script>
</body>
</html>
